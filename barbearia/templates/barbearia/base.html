<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}BarberView{% endblock %}</title>
    <!-- Bootstrap CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; font-size: 1.4rem; }
        .card { box-shadow: 0 2px 6px rgba(0,0,0,0.08); border: none; }
        .badge-disponivel { background-color: #198754; }
        .badge-emprestado { background-color: #dc3545; }
    </style>
</head>
<body>

<!-- Barra de Navegação -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'agendamento_lista' %}">BarberView</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'agendamento_lista' %}">Agendamentos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'profissional_lista' %}">Profissionais</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'cliente_lista' %}">Clientes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'servico_lista' %}">Serviços</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'agendamento_criar' %}">+ Novo Agendamento</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Mensagens de Sucesso/Erro -->
<div class="container">
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
</div>

<!-- Conteúdo Principal -->
<main class="container mb-5">
    {% block conteudo %}{% endblock %}
</main>

<!-- Rodapé -->
<footer class="bg-light border-top py-3 mt-5 text-center text-muted small">
    BarberView — Gerenciamento de Barbearia &copy; 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
